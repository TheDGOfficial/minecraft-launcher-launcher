name: rust-clippy analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  rust-clippy-analyze:
    if: "! contains(toJSON(github.event.commits.*.message), '[ci skip]')"

    name: Run rust-clippy analyzing
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: clippy

      - name: Cache Cargo packages
        id: cache-cargo-packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo

      - name: Install required cargo
        #if: steps.cache-cargo-packages.outputs.cache-hit != 'true'
        run: cargo install clippy-sarif sarif-fmt || true
        continue-on-error: true

      - name: Run rust-clippy
        run:
          chmod +x init_clippy_args.sh && . ./init_clippy_args.sh && cargo clippy --all-features --message-format=json ${{ env.CLIPPY_ARGS }} | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: rust-clippy-results.sarif
          wait-for-processing: true

      - name: Build the binary
        run:
          chmod +x release_build.sh && rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu && ./release_build.sh --portable

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: target/x86_64-unknown-linux-gnu/release/minecraft-launcher-launcher

